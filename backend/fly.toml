# fly.toml app configuration file generated for ac-repair-backend on 2026-03-01T16:48:27+05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ac-repair-backend'
primary_region = 'iad'
console_command = '/code/manage.py shell'

[build]

[env]
  PORT = '8000'
  CORS_ORIGINS = 'https://youracrepair.com,https://www.youracrepair.com'
  CSRF_TRUSTED_ORIGINS = 'https://youracrepair.com,https://www.youracrepair.com'
  FRONTEND_URL = 'https://www.youracrepair.com'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512

[[statics]]
  guest_path = '/code/static'
  url_prefix = '/static/'
